<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Building a New Reality...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eater&family=Mountains+of+Christmas:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        /* Custom styles for the page */
        body {
            font-family: 'Mountains of Christmas', cursive;
            overflow: hidden; /* Hide scrollbars */
            cursor: none;
        }

        a {
            cursor: none !important;
          }

        #main-heading {
            font-family: 'Eater', cursive;
        }
        
        /* Keep the monospaced font for the decrypting characters for a cool effect */
        .scramble-char {
            font-family: 'Roboto Mono', monospace;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Place canvas behind everything */
        }

        /* Target Cursor Styles */
        .cursor-dot,
        .cursor-outline {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
            opacity: 1;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #b91c1c; /* red-700 */
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            background-color: rgba(185, 28, 28, 0.3);
            border: 2px solid rgba(185, 28, 28, 0.7);
            transition: width 0.3s ease-in-out, height 0.3s ease-in-out, border-width 0.3s ease-in-out;
        }
        
        .cursor-outline.hover {
             width: 60px;
             height: 60px;
             border-width: 3px;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .animate-pulse-slow {
             animation: pulse 4s infinite ease-in-out;
        }

        .social-icon:hover {
            transform: translateY(-5px) scale(1.1);
            color: #ef4444; /* red-500 on hover */
        }
    </style>
</head>
<body class="bg-black text-white">
    
    <!-- Custom Cursor Elements -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Content -->
    <div class="relative min-h-screen flex flex-col items-center justify-center p-6 text-center z-10">
        
        <!-- Header text -->
        <div>
            <h1 id="main-heading" class="text-6xl md:text-8xl font-black uppercase tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-amber-500 opacity-0">
                Coming Soon
            </h1>
            <p id="sub-heading" class="mt-4 text-2xl md:text-4xl text-gray-200 animate-pulse-slow opacity-0 font-bold">
                // I'm Building Something Awesome
            </p>
        </div>

        <!-- Separator -->
        <div id="separator" class="w-24 h-1 bg-red-500 my-10 rounded-full opacity-0 transition-opacity duration-1000"></div>

        <!-- Description -->
        <p id="description-text" class="max-w-2xl text-gray-300 text-xl md:text-2xl opacity-0 font-bold leading-relaxed">
            My new portfolio is currently under construction. I'm working hard to create a unique experience. Stay tuned for the grand unveiling!
        </p>

        <!-- Social Media Icons -->
        <div id="social-icons" class="mt-12 flex space-x-8 opacity-0 transition-opacity duration-1000" style="transition-delay: 300ms;">
            <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="text-gray-300 transition-all duration-300 social-icon">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.168 6.839 9.492.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.031-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.378.203 2.398.1 2.651.64.7 1.03 1.595 1.03 2.688 0 3.848-2.338 4.695-4.566 4.942.359.308.678.92.678 1.852 0 1.338-.012 2.419-.012 2.745 0 .267.18.577.688.48A10.001 10.001 0 0022 12c0-5.523-4.477-10-10-10z" clip-rule="evenodd" /></svg>
            </a>
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="text-gray-300 transition-all duration-300 social-icon">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
            <a href="https://codepen.io" target="_blank" rel="noopener noreferrer" class="text-gray-300 transition-all duration-300 social-icon">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 1024 1024" aria-hidden="true"><path d="M1024 396.7l-420.7 259.9v-133l287.7-178.2-287.7-178.2v-133l420.7 259.9v135.5zM512 1024l-420.7-259.9v-135.5l287.7 178.2v-133l-287.7-178.2 287.7-178.2v-133l-287.7 178.2v-135.5l420.7 259.9 420.7-259.9v135.5l-287.7-178.2v133l287.7 178.2-287.7 178.2v133l287.7-178.2v135.5l-420.7 259.9zM512 700.1l-133-81.6 133-81.6 133 81.6-133 81.6zM512 476.9l-133-81.6 133-81.6 133 81.6-133 81.6z"></path></svg>
            </a>
        </div>
    </div>

    <script>
        // --- Floating Embers Background ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.color = `rgba(239, 68, 68, ${this.opacity})`; // red-500
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;

                // Reset particle if it goes off screen
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
                
                // Add a slight flicker
                if (Math.random() > 0.98) {
                    this.opacity = Math.random() * 0.5 + 0.5;
                    this.color = `rgba(239, 68, 68, ${this.opacity})`;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowColor = 'rgba(239, 68, 68, 1)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.floor(canvas.width / 15);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const particle of particles) {
                particle.update();
                particle.draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animateParticles();


        // --- Target Cursor Effect ---
        const cursorDot = document.querySelector(".cursor-dot");
        const cursorOutline = document.querySelector(".cursor-outline");
        const mousePos = { x: 0, y: 0 };
        const outlinePos = { x: 0, y: 0 };

        window.addEventListener("mousemove", e => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        const animateCursor = () => {
            const delay = 0.15;
            outlinePos.x += (mousePos.x - outlinePos.x) * delay;
            outlinePos.y += (mousePos.y - outlinePos.y) * delay;
            
            cursorDot.style.transform = `translate(${mousePos.x}px, ${mousePos.y}px)`;
            cursorOutline.style.transform = `translate(${outlinePos.x}px, ${outlinePos.y}px)`;
            
            requestAnimationFrame(animateCursor);
        };
        
        document.addEventListener('DOMContentLoaded', () => {
             cursorDot.style.transform = 'translate(-50%, -50%)';
             cursorOutline.style.transform = 'translate(-50%, -50%)';
             animateCursor();
        });


        // Add hover effect for links
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursorOutline.classList.add('hover');
            });
            link.addEventListener('mouseleave', () => {
                cursorOutline.classList.remove('hover');
            });
        });


        // --- Text Decrypt Effect ---
        class TextScramble {
            constructor(el) {
                this.el = el;
                this.chars = '!<>-_\\/[]{}—=+*^?#________';
                this.update = this.update.bind(this);
            }
            setText(newText) {
                const oldText = this.el.innerText;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => (this.resolve = resolve));
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    const start = Math.floor(Math.random() * 40);
                    const end = start + Math.floor(Math.random() * 40);
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }
            update() {
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span class="scramble-char">${char}</span>`;
                    } else {
                        output += from;
                    }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                    this.frame++;
                }
            }
            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        // --- Animation Orchestration ---
        document.addEventListener('DOMContentLoaded', () => {
            const mainHeading = document.getElementById('main-heading');
            const subHeading = document.getElementById('sub-heading');
            const description = document.getElementById('description-text');
            const separator = document.getElementById('separator');
            const socialIcons = document.getElementById('social-icons');

            const fx1 = new TextScramble(mainHeading);
            const fx2 = new TextScramble(subHeading);
            const fx3 = new TextScramble(description);

            const originalTexts = [ mainHeading.innerText, subHeading.innerText, description.innerText ];
            
            mainHeading.innerText = '';
            subHeading.innerText = '';
            description.innerText = '';

            const runAnimations = async () => {
                mainHeading.style.opacity = 1;
                subHeading.style.opacity = 1;
                description.style.opacity = 1;
                separator.style.opacity = 1;

                const animations = [
                    fx1.setText(originalTexts[0]),
                    fx2.setText(originalTexts[1]),
                    fx3.setText(originalTexts[2])
                ];

                await Promise.all(animations);
                socialIcons.style.opacity = 1;
            };

            setTimeout(runAnimations, 500);
        });
    </script>
</body>
</html>
